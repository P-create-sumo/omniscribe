<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniScribe</title>
  <meta name="description" content="#6366f1" />
  <meta property="og:title" content="OmniScribe" />
  <meta property="og:description" content="#6366f1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .glow {
      position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, #8b5cf633 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      max-width: 680px; width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      backdrop-filter: blur(12px);
      position: relative;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }
    .emoji { font-size: 4rem; margin-bottom: 1rem; display: block; }
    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8b5cf6, );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      line-height: 1.1;
    }
    .tagline {
      font-size: 1.15rem;
      color: #94a3b8;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .cta-row {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #8b5cf6, );
      color: #fff; font-weight: 600; font-size: 0.95rem;
      padding: 12px 28px; border-radius: 12px;
      text-decoration: none; border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #e2e8f0; font-weight: 500; font-size: 0.95rem;
      padding: 12px 28px; border-radius: 12px;
      text-decoration: none; transition: background 0.2s, transform 0.2s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 1.5rem 0; }
    .footer { color: #475569; font-size: 0.8rem; }
    .footer a { color: #64748b; text-decoration: none; }
    .footer a:hover { color: #94a3b8; }
    @media (max-width: 480px) {
      h1 { font-size: 2rem; }
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="badge">⚡ Built with Base44 &amp; AI</div>
    <span class="emoji">🧠</span>
    <h1>OmniScribe</h1>
    <p class="tagline">Transform your books and courses into AI-powered expert agents. Upload content, create agents, get answers.</p>
    <div class="cta-row">
      <a href="https://github.com/P-create-sumo/omniscribe" class="btn-primary">
        View on GitHub →
      </a>
      <a href="https://github.com/P-create-sumo/omniscribe#readme" class="btn-secondary">
        Read the Docs
      </a>
    </div>
    <hr class="divider" />
    <p class="footer">
      Made by <a href="https://github.com/P-create-sumo">P-Create-Sumo</a> · Open Source · MIT License
    </p>
  </div>
</body>
</html>
